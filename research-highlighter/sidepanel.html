<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      padding: 12px; 
      font-size: 13px;
      color: #333;
    }
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 20px; 
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    h3 { margin: 0; font-weight: 600; font-size: 14px; }
    
    .toggle-btn { 
      background: #f5f5f5; 
      border: 1px solid #e0e0e0; 
      padding: 4px 10px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 11px;
      color: #555;
      transition: all 0.2s;
    }
    .toggle-btn:hover { background: #e8e8e8; color: #000; }
    
    .group { margin-bottom: 20px; }
    .group-title { 
      font-weight: 600; 
      color: #888; 
      font-size: 10px; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px; 
      cursor: pointer;
    }
    .group-title:hover { color: #000; text-decoration: underline; }
    
    /* Flex container for the item */
    .item { 
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px; 
      margin-bottom: 8px; 
      background: #fff; 
      border: 1px solid #e5e5e5; 
      border-radius: 8px; 
      cursor: pointer; 
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .item:hover { 
      border-color: #000; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    
    .item-text {
      flex: 1;
      padding-right: 10px;
      line-height: 1.4;
      word-break: break-word;
    }
    
    /* Minimalist Close Button (X-flag) */
    .delete-btn {
      width: 16px;
      height: 16px;
      min-width: 16px; /* Prevent squishing */
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: transparent;
      color: #ccc;
      border: none;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      margin-top: 2px; /* Visual alignment with text */
    }
    .delete-btn:hover {
      background: #eee;
      color: #000;
    }
    
    .empty { color: #aaa; font-style: italic; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <h3 id="mode-title">Current Tab</h3>
    <button id="toggle-mode" class="toggle-btn">Show All</button>
  </div>
  <div id="list"></div>
  <script src="sidepanel.js"></script>
</body>
</html>
